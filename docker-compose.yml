services:
  db:
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_DB: supertour
      POSTGRES_USER: supertour
      POSTGRES_PASSWORD: supertour
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U supertour -d supertour"]
      interval: 5s
      timeout: 5s
      retries: 20
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      SECRET_KEY: change-me-in-production
      DEBUG: "True"
      ALLOWED_HOSTS: localhost,127.0.0.1,backend,frontend
      DATABASE_URL: postgres://supertour:supertour@db:5432/supertour
      CORS_ALLOWED_ORIGINS: http://localhost:3000,http://127.0.0.1:3000
      CSRF_TRUSTED_ORIGINS: http://localhost:3000,http://127.0.0.1:3000
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-5.6-luna}
    command: >
      sh -c "python manage.py migrate &&
             python manage.py seed_demo &&
             python manage.py runserver 0.0.0.0:8000"
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: http://localhost:8000/api
        API_INTERNAL_BASE_URL: http://backend:8000/api
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000/api
      API_INTERNAL_BASE_URL: http://backend:8000/api
      HOSTNAME: 0.0.0.0
      PORT: 3000
      NEXT_TELEMETRY_DISABLED: "1"
    ports:
      - "3000:3000"

volumes:
  postgres_data:
